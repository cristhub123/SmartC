# netlify.toml — SmartCity Córdoba Urbano

[build]
  publish = "."

# Security headers + enable JS modules
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-XSS-Protection = "1; mode=block"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"

# Cache JS and CSS aggressively (they're versioned via filenames)
[[headers]]
  for = "/js/*"
  [headers.values]
    Cache-Control = "public, max-age=3600"

[[headers]]
  for = "/css/*"
  [headers.values]
    Cache-Control = "public, max-age=3600"

# Cache data files shorter (they change more often)
[[headers]]
  for = "/data/*"
  [headers.values]
    Cache-Control = "public, max-age=300"
